name: flenx_demo
description: Site de exemplo do Flenx — importa o framework (package:flenx) e monta o site só com conteúdo. Referência de uso para devs.
version: 0.0.1

environment:
  sdk: ^3.10.0

dependencies:
  flenx:
    path: ../..
  flutter:
    sdk: flutter
  # jaspr: o app é escrito em jaspr (Component/@client/Document) e o build exige.
  # jaspr_flutter_embed: a chamada de FlutterEmbedView precisa ficar no app
  #   (o jaspr_builder escaneia o app p/ gerar o bootstrap do Flutter).
  # shelf/shelf_router/web saíram — vêm via package:flenx (server.dart/embed.dart).
  jaspr: ^0.23.1
  jaspr_flutter_embed: ^0.4.11
  # Cliente HTTP do editor de posts (admin → API /api/blog/posts).
  http: ^1.2.0

dev_dependencies:
  build_runner: ^2.10.0
  build_web_compilers: ^4.8.0
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  jaspr_builder: ^0.23.1
  jaspr_test: ^0.23.1

jaspr:
  mode: server
  flutter: embedded

flutter:
  uses-material-design: true
