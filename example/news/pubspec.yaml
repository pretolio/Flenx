name: flenx_news
description: Portal de notícias de exemplo do Flenx — markdown + SSR + SEO, só Dart.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.10.0

dependencies:
  flenx:
    path: ../..
  flutter:
    sdk: flutter
  jaspr: ^0.23.1
  # jaspr_flutter_embed: a ilha do admin (FlutterIsland) é embutida no app.
  jaspr_flutter_embed: ^0.4.11
  # Cliente HTTP usado pelo admin (telas que falam com /api/*).
  http: ^1.2.0

dev_dependencies:
  build_runner: ^2.10.0
  build_web_compilers: ^4.8.0
  flutter_lints: ^5.0.0
  jaspr_builder: ^0.23.1

jaspr:
  mode: server
  flutter: embedded

flutter:
  uses-material-design: true
