name: flenx_shop
description: Loja de exemplo do Flenx — montada 100% em Dart com o kit do framework.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.10.0

dependencies:
  flenx:
    path: ../..
  flutter:
    sdk: flutter
  jaspr: ^0.23.1
  # Admin e carrinho são ilhas Flutter embutidas.
  jaspr_flutter_embed: ^0.4.11
  # Cliente HTTP (admin/carrinho) e acesso ao localStorage do carrinho.
  http: ^1.2.0
  web: ^1.1.0

dev_dependencies:
  build_runner: ^2.10.0
  build_web_compilers: ^4.8.0
  flutter_lints: ^5.0.0
  jaspr_builder: ^0.23.1

jaspr:
  mode: server
  flutter: embedded

flutter:
  uses-material-design: true
