name: flenx
description: >-
  SSR Flutter/Dart estilo Next.js: kit de UI em Dart (sem HTML/CSS), blog,
  SEO/sitemap/llms.txt automáticos, admin, APIs (Dart ou PHP) e banco plugável
  (Supabase/Firebase).
version: 0.2.0
repository: https://github.com/pretolio/Flenx
homepage: https://github.com/pretolio/Flenx
issue_tracker: https://github.com/pretolio/Flenx/issues

topics:
  - jaspr
  - ssr
  - seo
  - flutter
  - framework

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.0
  http: ^1.2.0
  jaspr: ^0.23.1
  jaspr_flutter_embed: ^0.4.11
  markdown: ^7.3.1
  shelf: ^1.4.0
  shelf_router: ^1.1.0
  web: ^1.1.0
  yaml: ^3.1.3

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  jaspr_test: ^0.23.1
