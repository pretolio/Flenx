name: flext_news
description: Portal de notícias de exemplo do Flext — markdown + SSR + SEO, só Dart.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.10.0

dependencies:
  flext:
    path: ../flext
  flutter:
    sdk: flutter
  jaspr: ^0.23.1

dev_dependencies:
  build_runner: ^2.10.0
  build_web_compilers: ^4.8.0
  flutter_lints: ^5.0.0
  jaspr_builder: ^0.23.1

jaspr:
  mode: server
